<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TVS Spare Parts Price List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="top-header">
    <div class="logo">eAuto-Style</div>
    <input type="text" id="searchBox" placeholder="Search spare part..." onkeyup="searchParts()">
</header>

<!-- MAIN -->
<div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Select TVS Model</h3>
        <select id="bikeModel" onchange="showParts()">
            <option value="">-- Select --</option>
            <option value="apache">TVS Apache RTR</option>
            <option value="jupiter">TVS Jupiter</option>
            <option value="ntorq">TVS Ntorq</option>
            <option value="starcity">TVS Star City</option>
            <option value="sport">TVS Sport</option>
            <option value="raider">TVS Raider 125</option>
            <option value="xl100">TVS XL100</option>
        </select>
    </aside>

    <!-- CONTENT -->
    <main class="content">
        <h2>Spare Parts Price List</h2>
        <div id="partsList"></div>
    </main>
</div>

<!-- FOOTER -->
<footer>
    © 2026 Free Spare Parts Website
</footer>

<script src="script.js"></script>
</body>
</html>
